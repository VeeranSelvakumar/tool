<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c6ff">
<title>💎 Pro Tool Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  padding:20px;
}
.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}
.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.menu div{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.menu div:hover,
.menu .active{
  background:#00c6ff;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-bottom:20px;
}
.card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:12px;
  text-align:center;
  backdrop-filter:blur(10px);
}
.card h3{
  margin:0;
  font-size:24px;
  color:#00eaff;
}

/* TOOL BOX */
.box{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  display:none;
}
.box.active{
  display:block;
}

/* INPUT */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
button{
  background:#00c6ff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#0072ff;
}

/* CANVAS */
canvas{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  background:#fff;
}
@media(max-width:768px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }
  .main{
    margin-left:0;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>💎 PRO TOOL</h2>

  <div class="menu">
    <div class="active" onclick="showPage('dashboard',this)">📊 Dashboard</div>
    <div onclick="showPage('photo',this)">📸 Photo Tool</div>
    <div onclick="showPage('pdf',this)">📄 PDF Tool</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
  <h2>Dashboard</h2>
  <div>👤 Admin</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box active">
  <div class="cards">
    <div class="card">
      <h3 id="imgCount">0</h3>
      <p>Images Processed</p>
    </div>
    <div class="card">
      <h3 id="pdfCount">0</h3>
      <p>PDF Converted</p>
    </div>
    <div class="card">
      <h3 id="compressCount">0</h3>
      <p>Compressed</p>
    </div>
  </div>

  <p>🚀 Welcome to your premium tool dashboard</p>
</div>

<!-- PHOTO TOOL -->
<div id="photo" class="box">
<h3>📸 Photo Tool</h3>
<p id="sizeInfo"></p>
<input type="file" id="upload">

<select id="size">
  <option value="passport">Passport</option>
  <option value="pan">PAN</option>
  <option value="id">ID Card</option>
  <option value="a4">A4</option>
  <option value="custom">Custom</option>
</select>

<input type="number" id="kb" placeholder="Max KB">

<canvas id="canvas"></canvas>

<button onclick="download()">Download</button>
</div>

<!-- PDF TOOL -->
<div id="pdf" class="box">
<h3>📄 PDF Tool</h3>

<input type="file" id="pdfUpload">
<button onclick="convertPDF(); updatePDF()">PDF ➜ Images</button>

<hr>

<input type="file" id="imgUpload" multiple>
<button onclick="imagesToPDF(); updatePDF()">Images ➜ PDF</button>

<hr>

<input type="file" id="pdfCompress">
<input type="number" id="pdfQuality" placeholder="Quality %">
<button onclick="compressPDF(); updateCompress()">Compress PDF</button>
</div>

</div>

<script>
// PAGE SWITCH
function showPage(id,el){
  document.querySelectorAll('.box').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.menu div').forEach(m=>m.classList.remove('active'));
  document.querySelector(".top h2").innerText = id.charAt(0).toUpperCase()+id.slice(1);

  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// COUNTERS
let img=0,pdf=0,comp=0;

function updateImage(){
  img++;
  document.getElementById("imgCount").innerText=img;
}
function updatePDF(){
  pdf++;
  document.getElementById("pdfCount").innerText=pdf;
}
function updateCompress(){
  comp++;
  document.getElementById("compressCount").innerText=comp;
}
</script>

<script>
// ================= PHOTO TOOL =================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let currentImg=null;

upload.onchange = e=>{
  const file = e.target.files[0];
  const img = new Image();

  img.onload=()=>{
    currentImg=img;
    processImage();
  }
  img.src=URL.createObjectURL(file);
};

size.onchange=processImage;

function processImage(){
  if(!currentImg) return;

  let w,h;
  const type=size.value;

  if(type=="passport"){w=413;h=531;}
  else if(type=="pan"){w=236;h=236;}
  else if(type=="id"){w=472;h=472;}
  else if(type=="custom"){w=200;h=230;}
  else if(type=="a4"){w=2480;h=3508;}

  canvas.width=w;
  canvas.height=h;

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,w,h);

  if(type=="a4"){
    const r=Math.min(w/currentImg.width,h/currentImg.height);
    const nw=currentImg.width*r;
    const nh=currentImg.height*r;

    ctx.drawImage(currentImg,0,0,currentImg.width,currentImg.height,
      (w-nw)/2,(h-nh)/2,nw,nh);
  }else{
    const ar=w/h;
    let cw=currentImg.width;
    let ch=cw/ar;

    if(ch>currentImg.height){
      ch=currentImg.height;
      cw=ch*ar;
    }

    ctx.drawImage(currentImg,
      (currentImg.width-cw)/2,
      (currentImg.height-ch)/2,
      cw,ch,0,0,w,h);
  }

  showSize();
}

function download(){
  let kbLimit=kb.value;
  let q=0.9;

  function loop(){
    const data=canvas.toDataURL("image/jpeg",q);
    const sizeKB=(data.length*3/4)/1024;

    if(kbLimit && sizeKB>kbLimit && q>0.1){
      q-=0.05;
      loop();
    }else{
      const a=document.createElement("a");
      a.href=data;
      a.download="photo.jpg";
      a.click();
      updateImage();
      alert("Size: "+Math.round(sizeKB)+" KB");
    }
  }
  loop();
}

function showSize(){
  const data=canvas.toDataURL("image/jpeg",1);
  const sizeKB=(data.length*3/4)/1024;
  sizeInfo.innerText="Approx: "+Math.round(sizeKB)+" KB";
}

// ================= PDF ➜ IMAGES =================
function convertPDF(){
  const file=pdfUpload.files[0];
  if(!file){alert("Upload PDF");return;}

  const reader=new FileReader();
  reader.onload=async function(){
    const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    const zip=new JSZip();

    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:2});

      const c=document.createElement("canvas");
      c.width=vp.width;
      c.height=vp.height;

      await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;

      zip.file("page"+i+".png",c.toDataURL().split(",")[1],{base64:true});
    }

    zip.generateAsync({type:"blob"}).then(b=>{
      const a=document.createElement("a");
      a.href=URL.createObjectURL(b);
      a.download="images.zip";
      a.click();
    });
  };
  reader.readAsArrayBuffer(file);
}

// ================= IMAGES ➜ PDF =================
function imagesToPDF(){
  const files=imgUpload.files;
  if(!files.length){alert("Upload images");return;}

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();
  let i=0;

  function add(){
    const r=new FileReader();
    r.onload=function(){
      const img=new Image();
      img.src=this.result;

      img.onload=function(){
        const w=pdf.internal.pageSize.getWidth();
        const h=(img.height*w)/img.width;

        if(i>0) pdf.addPage();
        pdf.addImage(img,"JPEG",0,0,w,h);

        i++;
        if(i<files.length) add();
        else pdf.save("output.pdf");
      }
    }
    r.readAsDataURL(files[i]);
  }
  add();
}

// ================= PDF COMPRESS =================
async function compressPDF(){
  const file=pdfCompress.files[0];
  if(!file){alert("Upload PDF");return;}

  const q=(pdfQuality.value||60)/100;

  const reader=new FileReader();
  reader.onload=async function(){
    const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    const {jsPDF}=window.jspdf;
    const newPDF=new jsPDF();

    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:1.5});

      const c=document.createElement("canvas");
      c.width=vp.width;
      c.height=vp.height;

      await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;

      const img=c.toDataURL("image/jpeg",q);
      const w=newPDF.internal.pageSize.getWidth();
      const h=(c.height*w)/c.width;

      if(i>1) newPDF.addPage();
      newPDF.addImage(img,"JPEG",0,0,w,h);
    }

    newPDF.save("compressed.pdf");
  };
  reader.readAsArrayBuffer(file);
}
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
  .then(()=>console.log("SW Registered"));
}
</script>

</body>
</html>
